aid: actionstep
name: Actionstep
description: >-
  Actionstep is a cloud-based legal practice management platform serving
  midsize law firms with a REST API for managing matters, contacts, documents,
  tasks, billing, trust accounting, and law firm financial reporting. The API
  enables developers to build integrations using Actionstep as the back-end
  database with built-in data structures and business models for workflow,
  document management, calendaring, time sheets, billing, and general ledger.
